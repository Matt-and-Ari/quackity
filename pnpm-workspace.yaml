packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@cloudflare/realtimekit-react": ^1.2.5
  "@cloudflare/realtimekit-react-ui": ^1.1.1
  "@emoji-mart/data": ^1.2.1
  "@instantdb/core": ^0.22.174
  "@instantdb/react": ^0.22.174
  "@tailwindcss/vite": ^4.2.2
  "@types/node": ^24
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.1
  clsx: ^2.1.1
  instant-cli: ^0.22.174
  react: ^19.2.4
  react-dom: ^19.2.4
  resend: ^6.10.0
  tailwindcss: ^4.2.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wouter: ^3.9.0

catalogMode: prefer
overrides:
  vite: "catalog:"
