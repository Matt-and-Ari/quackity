packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@instantdb/core": ^0.22.174
  "@instantdb/react": ^0.22.174
  "@types/node": ^24
  instant-cli: ^0.22.174
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
